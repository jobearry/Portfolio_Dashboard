<a hlmItem variant="muted" [href]="url()" target="_blank" rel="noopener noreferrer">
  <div hlmItemContent class="truncate">
    <div hlmItemTitle>{{title()}}</div>
    <p hlmItemDescription>{{description()}}</p>
  </div>
  <div hlmItemActions>
    <ng-icon hlm name="lucideExternalLink" size="sm" />
  </div>
</a>
