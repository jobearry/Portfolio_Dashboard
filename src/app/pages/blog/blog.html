<section class="p-3">
  <div class="p-3 flex grow gap-3">
    @for (item of notionService.state().content; track $index) {
      <app-card class="flex"
          [title]="item.title"
          [description]="item.date"
          [hasCta]="true"
          [ctaName]="'View Notion page'">
        </app-card>
    }
  </div>
  <hr>
</section>
