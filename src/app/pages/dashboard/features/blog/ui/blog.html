<section class="p-3">
  <div class="p-2 grid grid-cols-1 md:grid-cols-5 gap-4">
    @if(notionService.state().loading){
      <app-skeleton-card></app-skeleton-card>
    }@else {
      @for (item of notionService.state().content; track $index) {
        <app-card class="flex"
            [title]="item.title"
            [description]="item.date">
            <ng-container slot="footer">
              <div class="flex justify-end w-full gap-2">
                <a [href]="parseUrl(item.url)" target="_blank"
                  variant="outline"
                  size="sm">
                    Read more
                </a>

                <ng-icon hlm name="lucideExternalLink" size="sm"></ng-icon>
              </div>
            </ng-container>
          </app-card>
      }
    }
  </div>
  <hr>
</section>
