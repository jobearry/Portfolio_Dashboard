<section class="p-3">
  <div class="p-2 grid grid-cols-1 md:grid-cols-5 gap-4">
    @if(notionService.state().loading){
      <app-skeleton-item></app-skeleton-item>
    }@else {
      @for (item of notionService.state().content; track $index) {
        <app-item
          [title]="item.title"
          [description]="item.date"
          [url]="parseUrl(item.url)">
        </app-item>
      }
    }
  </div>
</section>
