<section class="p-4 border-b flex flex-col md:flex-row gap-2 overflow-x-auto">
  <app-card
    [title]="'Jonathan Golimlim'"
    [description]="'@jobearry'"
    class="">
    <ng-container slot="content">
    </ng-container>
    <ng-container slot="footer">
      <span [class]="portfolioCardFooterStyle">
        A full-stack developer who focuses on developing web applications through Angular and .NET
      </span>
    </ng-container>
  </app-card>

  <div class="w-full h-full grid grid-cols-1 lg:grid-cols-2 gap-2">
    <app-card
      [title]="'Experiences'"
      [description]="'Timeline'"
      class="">
      <ng-container slot="content">
        <div class="flex flex-col gap-2">
          @if(_expService.getState().loading){
            <app-skeleton-item></app-skeleton-item>
          }@else {
            @for (item of _expService.getState().content; track $index) {
              <app-item
                [title]="item.companyName"
                [description]="item.description"
                [icon]="''">
              </app-item>
            }
          }
        </div>
      </ng-container>
      <ng-container slot="footer">
        <!-- <span [class]="portfolioCardFooterStyle">
          Journey into where I am now
        </span> -->
      </ng-container>
    </app-card>
  </div>
</section>
