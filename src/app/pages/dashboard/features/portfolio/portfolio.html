<section class="p-4 border-b flex flex-col md:flex-row gap-2 overflow-x-auto">
  <app-card
    [title]="'Jonathan Golimlim'"
    [description]="'@jobearry'"
    class="">
    <ng-container slot="content">
    </ng-container>
    <ng-container slot="footer">
      <span [class]="portfolioCardFooterStyle">
        A full-stack developer who focuses on developing web applications through Angular and .NET
      </span>
    </ng-container>
  </app-card>
</section>
<section class="p-4 border-b flex flex-col md:flex-row gap-2">
  <div class="h-full flex-1">
      <app-card
        [title]="'Experiences'"
        [description]="'Timeline'"
        class="">
        <ng-container slot="content">
          <div class="flex flex-col lg:flex-row gap-2">
            @if(_expService.getState().loading){
              <app-skeleton-item class="w-full"></app-skeleton-item>
            }@else {
              @for (item of _expService.getState().content; track item.experienceId ) {
                <button
                  (click)="openDialog()"
                  [class]="`text-start bg-muted/50 p-3.5 rounded-sm ${transitionMoveUp}
                  flex items-center gap-3 w-full`">
                  <span hlmH3>{{item.experienceId < 10? `0${item.experienceId}` : item.experienceId}}</span>
                  <div class="flex-1">
                    <h3>{{item.companyName}}</h3>
                    <p class="text-zinc-500">{{item.description}}</p>
                  </div>
                  <ng-icon hlm name="lucideInfo" size="sm" class="font-bold" />
                </button>
              }
            }
          </div>
        </ng-container>
        <ng-container slot="footer">
          <span [class]="portfolioCardFooterStyle">
            - still ongoing -
          </span>
        </ng-container>
      </app-card>
  </div>

</section>
