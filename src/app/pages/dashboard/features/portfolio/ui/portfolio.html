<section class="p-4 flex border-b flex-col md:flex-row gap-2">
  <div class="flex justify-end gap-2 w-full flex-wrap">
    @for (item of controls; track $index) {
      <app-section-button
        [item]="item"
        [itemCount]="itemCountFor(item['sectionCounter'])!"
        (btnClick)="onButtonClicked(item['sectionName'])"></app-section-button>
    }
  </div>
</section>
<section class="p-4 flex flex-col md:flex-wrap gap-2 w-full">
  <router-outlet/>
</section>
