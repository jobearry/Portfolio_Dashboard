
<section class="flex flex-col gap-4">
  @if(_projectService.getState().loading){
    <app-skeleton-item></app-skeleton-item>
  }@else {
    <span>
      <h3 hlmH3>Projects</h3>
      <p class="text-muted-foreground">Professional, and personal contributions</p>
    </span>
    <div [class]="`grid md:grid-cols-2 lg:grid-cols-3 gap-2`">
      @for (project of _projectService.getState().content; track project.projectId) {
        <button
          [class]="`bg-zinc-900/50 text-start border p-3.5 rounded-sm ${transitionMoveUp}
          flex items-center gap-3 w-full`">
          <span hlmH3>{{project.projectId < 10? `0${project.projectId}` : project.projectId}}</span>
          <div class="flex-1">
            <h3>{{project.projectName}}</h3>
            <p class="text-zinc-500 truncate w-60">{{project.description}}</p>
          </div>
          <!-- <ng-icon name="lucideInfo" size="sm" class="font-bold" /> -->
        </button>
      }
    </div>
  }
</section>
